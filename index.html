<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabuada - Jogo de Matemática</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 Tabuada</h1>
            <div class="stats">
                <div class="stat">
                    <span class="label">XP:</span>
                    <span id="xp" class="value">0</span>
                </div>
                <div class="stat">
                    <span class="label">Vidas:</span>
                    <span id="lives" class="value">3</span>
                </div>
                <div class="stat">
                    <span id="level" class="value">Nível 1</span>
                </div>
            </div>
            <div class="progress-container">
                <div id="progressBar" class="progress-bar"></div>
            </div>
        </header>

        <main>
            <div id="gameArea" class="game-area">
                <div class="question-container">
                    <p id="question" class="question">Carregando...</p>
                </div>

                <div class="options-container">
                    <button id="option1" class="option-btn" onclick="checkAnswer(this)"></button>
                    <button id="option2" class="option-btn" onclick="checkAnswer(this)"></button>
                    <button id="option3" class="option-btn" onclick="checkAnswer(this)"></button>
                    <button id="option4" class="option-btn" onclick="checkAnswer(this)"></button>
                </div>

                <div id="feedback" class="feedback"></div>
            </div>

            <div id="gameOverScreen" class="game-over-screen hidden">
                <div class="game-over-content">
                    <h2 id="gameOverTitle">Game Over!</h2>
                    <p id="gameOverStats"></p>
                    <button onclick="restartGame()" class="restart-btn">Jogar Novamente</button>
                </div>
            </div>
        </main>

        <footer>
            <p>Desenvolvido com ❤️ para aprender tabuada</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
